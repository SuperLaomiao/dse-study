name: CloudBase Smoke

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  smoke:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for CloudBase deployment
        run: sleep 180

      - name: Retry CloudBase smoke check
        run: |
          if [ -z "$SMOKE_BASE_URL" ]; then
            echo "SMOKE_BASE_URL secret is missing."
            exit 1
          fi

          for attempt in 1 2 3 4 5 6; do
            echo "Smoke attempt $attempt"
            if npm run smoke:cloudbase; then
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              sleep 60
            fi
          done

          echo "CloudBase smoke check did not pass after retries."
          exit 1
